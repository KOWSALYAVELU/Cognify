<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foods Gal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section class="gallery">
        <h2>Food Gallery</h2>
        <div class="thumbnails">
            <img src="food 2.jpg" alt="Food 2" data-full="food 2.jpg">
            <img src="food 8.jpg" alt="Food 8" data-full="food 8.jpg">
            <img src="food 9.webp" alt="Food 9" data-full="food 9.webp">
            <img src="food 10.webp" alt="Food 10" data-full="food 10.webp">

        </div>
    </section>

    <div id="imageModal" class="modal">
        <span class="close">&times;</span>
        <img class="modal-content" id="modalImage">
    </div>

    <section class="slideshow">
        <h2>Tasty Food </h2>
        <div class="slide-container">
            <div class="slides">
                <div class="slide active">
                    <img src="food 6.jpg" alt="Food 1">
                </div>
                <div class="slide">
                    <img src="food 1.jpg" alt="Food 3">
                </div>
                <div class="slide">
                    <img src="food 4.jpg" alt="Food 4">
                </div>
                <div class="slide">
                    <img src="food 5.avif" alt="Food 5">
                </div>
                <div class="slide">
                    <img src="food 3.webp" alt="Food 6">
                </div>
            </div>
        </div>
    </section>

    <script>
         const modal = document.getElementById('imageModal');
        const modalImg = document.getElementById('modalImage');
        const thumbnails = document.querySelectorAll('.thumbnails img');

        thumbnails.forEach(thumb => {
            thumb.addEventListener('click', () => {
                modal.style.display = 'block';
                modalImg.src = thumb.dataset.full;
            });
        });

        document.querySelector('.close').addEventListener('click', () => {
            modal.style.display = 'none';
        });

        window.addEventListener('click', (e) => {
            if (e.target === modal) modal.style.display = 'none';
        });
    </script>
</body>
</html>
